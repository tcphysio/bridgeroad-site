<!DOCTYPE html>
<html><head><style>
body{margin:0;background:#fff;display:flex;gap:2rem;padding:2rem;align-items:flex-start;flex-wrap:wrap}
.box{display:flex;flex-direction:column;align-items:center;gap:.75rem;font-family:sans-serif;font-size:.85rem;color:#666}
.header-sim{background:#F4F1EC;padding:1rem 2rem;display:flex;align-items:center;gap:1rem;border-radius:8px;width:480px}
.header-sim img{height:48px}
.header-sim .text{font-family:Georgia,serif;font-size:1rem;font-weight:600;line-height:1.2}
.header-sim .text span{display:block;font-family:sans-serif;font-size:.6rem;letter-spacing:.2em;color:#8A857B;text-transform:uppercase;font-weight:400}
.footer-sim{background:#1C1C1A;padding:1.5rem;border-radius:8px}
.footer-sim img{height:100px}
</style></head><body>
<div class="box">
  <p>Header (badge badge on paper)</p>
  <div class="header-sim">
    <img src="site/logo.svg" alt="logo">
    <div class="text">Bridge Road<span>Physiotherapy</span></div>
  </div>
</div>
<div class="box">
  <p>Footer (full logo on dark)</p>
  <div class="footer-sim">
    <img src="site/logo.svg" alt="logo" style="height:120px">
  </div>
</div>
<div class="box">
  <p>Full logo on white</p>
  <img src="site/logo.svg" style="height:200px;background:#fff">
</div>
</body></html>
